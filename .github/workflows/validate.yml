name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating marketplace.json..."
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          echo "Validating plugin.json..."
          python3 -m json.tool canary/.claude-plugin/plugin.json > /dev/null
          echo "Validating hooks.json..."
          python3 -m json.tool canary/hooks/hooks.json > /dev/null
          echo "Validating taxonomy.json..."
          python3 -m json.tool canary/scripts/taxonomy.json > /dev/null
          echo "All JSON valid."

      - name: Check bash syntax
        run: |
          for f in canary/scripts/*.sh canary/bin/*; do
            [[ -f "$f" ]] || continue
            # canary-badge is a Python tool that happens to live in bin/
            # alongside the bash CLIs — its syntax is checked in the
            # Python syntax step below, not here: bash -n on a Python
            # file is a guaranteed false-positive syntax error (e.g. it
            # trips on the first `os.path.foo(...)` call), not a
            # meaningful check of anything.
            if head -1 "$f" | grep -q '^#!.*python'; then
              echo "Skipping $f (Python — checked in the Python syntax step)"
              continue
            fi
            echo "Checking $f..."
            bash -n "$f"
          done
          echo "All bash syntax valid."

      - name: Check Python syntax
        run: |
          python3 -c "import py_compile; py_compile.compile('canary/scripts/dashboard.py', doraise=True)"
          python3 -c "import py_compile; py_compile.compile('canary/scripts/wrapped.py', doraise=True)"
          python3 -c "import py_compile; py_compile.compile('canary/scripts/custom_rules.py', doraise=True)"
          python3 -c "import py_compile; py_compile.compile('canary/bin/canary-badge', doraise=True)"

      # severity:error is blocking (no continue-on-error) — a shellcheck
      # error must fail the build.
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: canary/scripts
          severity: error

      - name: Run detector tests
        run: bash tests/test-detectors.sh

      - name: Run redaction tests
        run: bash tests/test-redact.sh

      - name: Run checksum tests
        run: bash tests/test-checksums.sh

      - name: Run false positive tests
        run: bash tests/test-no-false-positives.sh

      # Labeled benchmark corpus (tests/corpus.json) scored against
      # tests/baseline.json: recall must not regress and no preserved
      # (must-not-fire) type may newly fire. Improving recall on purpose
      # requires bumping baseline.json's recall_min in the same PR — see
      # CONTRIBUTING.md.
      - name: Run corpus benchmark (recall / false-positive ratchet)
        run: bash tests/test-corpus.sh

      # Canary Tokens: mint/plant/list/trips/revoke/ack, and the certain
      # literal-match trip detector shared by scan.sh/scan-file.sh.
      - name: Run canary tokens tests
        run: bash tests/test-tokens.sh

      # Log rotation: archive+gzip at the line/byte threshold, the rollup
      # ledger's lifetime-total math, and the gzip-absent degrade path.
      - name: Run log rotation tests
        run: bash tests/test-rotation.sh

      # custom_rules.py's own internal self-tests: redaction parity,
      # validator dispatch, the catastrophic-pattern heuristic, the
      # 250ms SIGALRM timeout, context boosting/dampening, and every rule
      # file shape. (Also exercised as a single pass/fail line inside
      # test-detectors.sh's own tally; this step runs it standalone so a
      # regression here is attributed to the right file, not lumped in
      # with the regex detector suite.)
      - name: Run custom rules self-test
        run: python3 canary/scripts/custom_rules.py --selftest

      # Generates the dashboard in --demo mode (synthetic data only, never
      # touches a real leaks.jsonl) and fails the build if the emitted HTML
      # references any external resource — the product's core "zero
      # network requests" claim, enforced mechanically instead of just
      # documented. Plain <a href="https://..."> links (e.g. the sonomos.ai
      # footer link) are intentionally NOT matched — only src=/@import/
      # url(...) references, which is what an actual network fetch needs.
      - name: Build demo dashboard and verify zero external references
        run: |
          DEMO_OUT="$(mktemp -d)/dashboard-demo.html"
          python3 canary/scripts/dashboard.py --demo --no-open --out "$DEMO_OUT"
          echo "Generated $DEMO_OUT ($(wc -c < "$DEMO_OUT") bytes)"
          grep -E '(src=|@import|url\()["'"'"']?https?://' "$DEMO_OUT" && exit 1 || true
          echo "OK: no external src=/@import/url() references found."

      # Same gate as above, for Canary Wrapped's --demo output.
      - name: Build Canary Wrapped demo and verify zero external references
        run: |
          WRAPPED_OUT="$(mktemp -d)/canary-wrapped-demo.html"
          python3 canary/scripts/wrapped.py --demo --no-open --out "$WRAPPED_OUT"
          echo "Generated $WRAPPED_OUT ($(wc -c < "$WRAPPED_OUT") bytes)"
          grep -E '(src=|@import|url\()["'"'"']?https?://' "$WRAPPED_OUT" && exit 1 || true
          echo "OK: no external src=/@import/url() references found."

      # canary-badge emits a standalone <svg>: it must be well-formed XML
      # and must not reference anything external — no @import, no remote
      # xlink:href/src, no url(http...). Zero network is Canary's hard
      # rule regardless of how a given host (GitHub/GitLab/npm, ...)
      # would otherwise sandbox an embedded SVG.
      - name: Verify canary-badge is valid, network-free SVG
        run: |
          BADGE_OUT="$(mktemp -d)/canary-badge-demo.svg"
          python3 canary/bin/canary-badge --out - > "$BADGE_OUT"
          echo "Generated $BADGE_OUT ($(wc -c < "$BADGE_OUT") bytes)"
          grep -qv '@import' "$BADGE_OUT"
          grep -E '(src=|@import|xlink:href=|url\()["'"'"']?https?://' "$BADGE_OUT" && exit 1 || true
          if command -v xmllint >/dev/null 2>&1; then
            xmllint --noout "$BADGE_OUT"
          else
            python3 -c "import xml.dom.minidom as m; m.parse('$BADGE_OUT')"
          fi
          echo "OK: badge is well-formed SVG with no external references."

      # Keeps the version badge in the README from silently drifting from
      # the plugin manifest (which is what /plugin install actually reads).
      - name: Verify README badge version matches plugin.json
        run: |
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('canary/.claude-plugin/plugin.json'))['version'])")
          README_VERSION=$(grep -oE 'version-[0-9]+\.[0-9]+\.[0-9]+-blue' README.md | head -1 | sed -E 's/version-([0-9.]+)-blue/\1/')
          echo "plugin.json version: $PLUGIN_VERSION"
          echo "README badge version: $README_VERSION"
          if [[ -z "$README_VERSION" ]]; then
            echo "Could not find a version badge in README.md"
            exit 1
          fi
          if [[ "$PLUGIN_VERSION" != "$README_VERSION" ]]; then
            echo "MISMATCH: README badge ($README_VERSION) != plugin.json version ($PLUGIN_VERSION)"
            exit 1
          fi
          echo "OK: versions match."

  # macOS ships BSD grep without -P, which forces detectors.sh and
  # audit-plugins.sh through their Perl fallback instead of the GNU
  # grep -oP fast path. This job exercises that exact code path
  # deterministically on Linux by shimming grep to reject any -P flag
  # cluster (mirroring BSD's usage error), so the fallback stays covered
  # even when no macOS runner is available.
  bsd-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BSD-grep shim (no PCRE)
        run: |
          mkdir -p "$RUNNER_TEMP/bsdshim"
          cat > "$RUNNER_TEMP/bsdshim/grep" <<'EOF'
          #!/usr/bin/env bash
          # Simulates BSD grep: no PCRE. Any -P-bearing flag cluster is a
          # usage error, exit 2, like macOS /usr/bin/grep.
          for a in "$@"; do
            case "$a" in
              --) break ;;
              -*P*) echo "grep: invalid option -- P" >&2; exit 2 ;;
            esac
          done
          exec /usr/bin/grep "$@"
          EOF
          chmod +x "$RUNNER_TEMP/bsdshim/grep"
          echo "$RUNNER_TEMP/bsdshim" >> "$GITHUB_PATH"

      - name: Confirm the shim forces the Perl path
        run: |
          if echo test | grep -oP 'test' 2>/dev/null; then
            echo "Shim ineffective: grep -oP still works"; exit 1
          fi
          echo "OK: grep -P rejected; detectors will use the Perl fallback."

      - name: Run detector tests (Perl fallback)
        run: bash tests/test-detectors.sh

      - name: Run redaction tests (Perl fallback)
        run: bash tests/test-redact.sh

      - name: Run checksum tests (Perl fallback)
        run: bash tests/test-checksums.sh

      - name: Run false positive tests (Perl fallback)
        run: bash tests/test-no-false-positives.sh

      - name: Run corpus benchmark (Perl fallback)
        run: bash tests/test-corpus.sh

      # Canary Tokens' own trip detector is grep -F (fixed-string), not
      # grep -P, but the shimmed PATH stays in effect for this whole job —
      # exercised here too for full parity with the validate job under
      # the BSD/Perl-fallback code path.
      - name: Run canary tokens tests (Perl fallback)
        run: bash tests/test-tokens.sh

      - name: Run log rotation tests (Perl fallback)
        run: bash tests/test-rotation.sh

  # Best-effort real-macOS leg. macOS runner capacity is not guaranteed
  # for this org (the first attempt sat queued for 15 minutes and was
  # auto-cancelled without ever starting), so this job is advisory:
  # continue-on-error keeps a runner drought from blocking every PR,
  # while the bsd-fallback job above provides the required coverage of
  # the same code path. If this job runs and fails on a real regression,
  # the same regression fails bsd-fallback too — as a required check.
  macos-advisory:
    runs-on: macos-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: command -v jq || brew install jq

      - name: Check bash syntax
        run: |
          for f in canary/scripts/*.sh canary/bin/*; do
            [[ -f "$f" ]] || continue
            # canary-badge is Python (checked via py_compile on the main
            # job's runner) — see the "validate" job for the full
            # explanation of why bash -n can't be run against it.
            if head -1 "$f" | grep -q '^#!.*python'; then
              continue
            fi
            bash -n "$f"
          done

      - name: Run all test suites
        run: |
          bash tests/test-detectors.sh
          bash tests/test-redact.sh
          bash tests/test-checksums.sh
          bash tests/test-no-false-positives.sh
          bash tests/test-corpus.sh
          bash tests/test-tokens.sh
          bash tests/test-rotation.sh

      - name: Build demo dashboard
        run: |
          DEMO_OUT="$(mktemp -d)/dashboard-demo.html"
          python3 canary/scripts/dashboard.py --demo --no-open --out "$DEMO_OUT"
          echo "Generated $DEMO_OUT ($(wc -c < "$DEMO_OUT") bytes)"
